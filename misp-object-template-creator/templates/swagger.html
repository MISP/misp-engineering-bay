<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Docs — MISP Object Template Creator</title>
    <link rel="stylesheet" href="/static/vendor/swagger-ui.css">
    <style>
        body { margin: 0; }
        .topbar-wrapper { display: none !important; }
    </style>
</head>
<body>
    <div id="swagger-ui"></div>
    <script src="/static/vendor/swagger-ui-bundle.js"></script>
    <script>
        SwaggerUIBundle({
            url: "{{ url_for('static', filename='openapi.json') }}",
            dom_id: '#swagger-ui',
            deepLinking: true,
            presets: [
                SwaggerUIBundle.presets.apis,
                SwaggerUIBundle.SwaggerUIStandalonePreset
            ],
            layout: "BaseLayout"
        });
    </script>
</body>
</html>
